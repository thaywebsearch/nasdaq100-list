name: Atualizar Market Cap NASDAQ 100

on:
  schedule:
    - cron: "0 8 * * 1-5"   # todos os dias úteis às 08:00 UTC
  workflow_dispatch:          # permite correr manualmente no GitHub

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install yfinance pandas

      - name: Correr o script
        run: |
          python "update market cap.py" \
            --input nasdaq100_full_-_Folha1.csv \
            --output nasdaq100_marketcap_$(date +%m%Y).csv

      - name: Guardar resultado no repositório
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nasdaq100_marketcap_*.csv
          git diff --cached --quiet || git commit -m "Atualização automática market cap $(date +%d/%m/%Y)"
          git push
